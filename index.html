<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人效仪表盘入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f6f7;
            color: #1f2329;
            line-height: 1.6;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
            padding: 48px 56px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1f2329;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .meta {
            font-size: 14px;
            color: #8f959e;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .meta span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .section-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2329;
            margin-bottom: 12px;
        }
        .link-wrapper {
            margin-bottom: 12px;
        }
        .link-wrapper a {
            color: #2563eb;
            text-decoration: none;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .link-wrapper a:hover {
            text-decoration: underline;
        }
        .update-time {
            font-size: 14px;
            color: #8f959e;
        }
        .divider {
            height: 1px;
            background: #e5e6eb;
            margin: 32px 0;
        }
        @media (max-width: 640px) {
            .card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 26px;
            }
            .section-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>人效仪表盘入口</h1>
            <div class="meta">
                <span>汪莉 编辑</span>
                <span>07-16 16:39 创建</span>
            </div>

            <div class="divider"></div>

            <h2 class="section-title">人效数据 日度监控仪表盘</h2>
            <div class="link-wrapper">
                <a href="dashboard.html" target="_blank" rel="noopener noreferrer">
                    点击进入仪表盘
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </a>
            </div>
            <div class="update-time">更新时间: 2026-07-20</div>
        </div>
    </div>
</body>
</html>
